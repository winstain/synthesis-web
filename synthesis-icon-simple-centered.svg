<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="tileClip">
      <rect width="1024" height="1024" rx="168" ry="168"/>
    </clipPath>

    <filter id="softBlur" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="86"/>
    </filter>

    <radialGradient id="base" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(760)">
      <stop stop-color="#FDFDFE"/>
      <stop offset="1" stop-color="#F6F6F5"/>
    </radialGradient>

    <linearGradient id="sInk" x1="360" y1="238" x2="690" y2="802" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111111"/>
      <stop offset="1" stop-color="#272727"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#tileClip)">
    <rect width="1024" height="1024" fill="url(#base)"/>

    <!-- light identity-family mesh blobs -->
    <circle cx="252" cy="238" r="218" fill="#8E7EFF" fill-opacity="0.19" filter="url(#softBlur)"/>
    <circle cx="774" cy="246" r="220" fill="#78C3FF" fill-opacity="0.16" filter="url(#softBlur)"/>
    <circle cx="302" cy="778" r="220" fill="#FFBA9A" fill-opacity="0.14" filter="url(#softBlur)"/>
    <circle cx="762" cy="768" r="208" fill="#9BE0C0" fill-opacity="0.10" filter="url(#softBlur)"/>

    <!-- single clean S, optically centered after render inspection -->
    <text x="500" y="688" text-anchor="middle" font-size="600" font-weight="700" font-family="Inter, SF Pro Display, Helvetica Neue, Arial, sans-serif" fill="url(#sInk)" letter-spacing="-18">S</text>
  </g>
</svg>
