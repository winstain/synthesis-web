<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a680f0"/>
      <stop offset="25%" style="stop-color:#66b8f0"/>
      <stop offset="50%" style="stop-color:#f0a680"/>
      <stop offset="75%" style="stop-color:#72e0b3"/>
      <stop offset="100%" style="stop-color:#f0cc72"/>
    </linearGradient>
    <linearGradient id="s-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a680f0;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#66b8f0;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#72e0b3;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Square background with subtle gradient -->
  <rect width="400" height="400" rx="48" fill="#fafafa"/>
  <rect width="400" height="400" rx="48" fill="url(#bg-grad)" opacity="0.18"/>
  <!-- S letterform — Inter 800 style, optically centered -->
  <text x="200" y="290" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="800" font-size="300" letter-spacing="-12" fill="#111">S</text>
</svg>
