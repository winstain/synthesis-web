<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="170" ry="170"/>
    </clipPath>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="78" />
    </filter>
    <radialGradient id="base" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(760)">
      <stop stop-color="#FCFCFD"/>
      <stop offset="1" stop-color="#F5F5F4"/>
    </radialGradient>
    <linearGradient id="stroke" x1="355" y1="282" x2="678" y2="742" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111111"/>
      <stop offset="1" stop-color="#2B2B2B"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="url(#base)"/>

    <!-- restrained gradient wash -->
    <circle cx="250" cy="235" r="210" fill="#8D7DFF" fill-opacity="0.18" filter="url(#blur)"/>
    <circle cx="770" cy="245" r="215" fill="#78C3FF" fill-opacity="0.16" filter="url(#blur)"/>
    <circle cx="305" cy="775" r="215" fill="#FFBA9A" fill-opacity="0.14" filter="url(#blur)"/>
    <circle cx="760" cy="760" r="210" fill="#9DE0C2" fill-opacity="0.12" filter="url(#blur)"/>

    <!-- thin modular S built from two offset strokes -->
    <path d="M659 341C626 311 578 294 524 294C436 294 372 340 372 407C372 460 409 490 475 504L555 521C610 531 638 554 638 594C638 646 589 681 521 681C459 681 408 661 369 626"
      stroke="url(#stroke)"
      stroke-width="54"
      stroke-linecap="square"
      stroke-linejoin="miter"/>

    <path d="M388 686C425 719 482 741 548 741C638 741 704 694 704 623C704 566 663 533 588 518L506 501C455 490 430 468 430 431C430 383 475 350 541 350C597 350 644 370 681 404"
      stroke="url(#stroke)"
      stroke-width="54"
      stroke-linecap="square"
      stroke-linejoin="miter"/>

    <!-- subtle modular cuts / anchors -->
    <rect x="330" y="606" width="44" height="44" fill="#111111"/>
    <rect x="650" y="360" width="44" height="44" fill="#111111"/>
  </g>
</svg>
