<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="170" ry="170"/>
    </clipPath>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="78" />
    </filter>
    <radialGradient id="base" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(760)">
      <stop stop-color="#FCFCFD"/>
      <stop offset="1" stop-color="#F5F5F4"/>
    </radialGradient>
    <linearGradient id="stroke" x1="350" y1="240" x2="690" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111111"/>
      <stop offset="1" stop-color="#2B2B2B"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="url(#base)"/>
    <circle cx="250" cy="235" r="210" fill="#8D7DFF" fill-opacity="0.18" filter="url(#blur)"/>
    <circle cx="770" cy="245" r="215" fill="#78C3FF" fill-opacity="0.16" filter="url(#blur)"/>
    <circle cx="305" cy="775" r="215" fill="#FFBA9A" fill-opacity="0.14" filter="url(#blur)"/>
    <circle cx="760" cy="760" r="210" fill="#9DE0C2" fill-opacity="0.12" filter="url(#blur)"/>
    <text x="512" y="630" text-anchor="middle" font-size="620" font-weight="700" font-family="Inter, Arial, Helvetica, sans-serif" fill="url(#stroke)" letter-spacing="-28">S</text>
  </g>
</svg>
